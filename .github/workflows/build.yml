name: OpenWrt-25.12-Release-Final

on:
  workflow_dispatch:
  push:
    paths:
      - 'seed.config'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  CONFIG_FILE: seed.config
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: 检查项目
        uses: actions/checkout@v4

      - name: 初始化编译环境
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install $(curl -fsSL https://raw.githubusercontent.com/anthony65535/scripts/master/openwrt-env-full)
          sudo timedatectl set-timezone "$TZ"

      - name: 下载源码
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt

      - name: 强制锁定 Release 源 (拒绝 Snapshots)
        run: |
          cd openwrt
          # 将 feeds 中所有可能指向 master/main 的地方强制改为 25.12 分支
          sed -i 's/master/openwrt-25.12/g' feeds.conf.default
          sed -i 's/main/openwrt-25.12/g' feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 加载配置与补丁
        run: |
          [ -f $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
          cd openwrt
          # 强制注入网页服务与 Passwall 依赖，确保 Release 版兼容性
          {
            echo "CONFIG_PACKAGE_luci=y"
            echo "CONFIG_PACKAGE_uhttpd=y"
            echo "CONFIG_PACKAGE_uhttpd-mod-ubus=y"
            echo "CONFIG_PACKAGE_luci-compat=y"
            echo "CONFIG_PACKAGE_luci-lib-ipkg=y"
            echo "CONFIG_LUCI_LANG_zh_Hans=y"
            echo "CONFIG_VERSION_SNAPSHOT=n"
          } >> .config
          make defconfig

      - name: 编译固件
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: 整理并上传
        uses: softprops/action-gh-release@v1
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v25.12-Stable-${{ github.run_id }}
          files: openwrt/bin/targets/x86/64/*combined-efi.img.gz
