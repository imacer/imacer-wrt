name: OpenWrt-V51

on:
  workflow_dispatch:
  push:
    paths:
      - 'seed.config'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  CONFIG_FILE: seed.config
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. 环境部署与磁盘清理
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup /usr/lib/jvm /opt/hostedtoolcache
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git gperf haveged lrzsz libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lld llvm liblzo2-dev make scons squashfs-tools upx-ucl unzip vim wget xmlto xxd zlib1g-dev help2man texinfo libpam0g-dev
          
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: 3. 源码检出与 Feeds 配置
        run: |
          # 确保目录干净
          rm -rf openwrt
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt
          echo "src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main" >> feeds.conf.default
          echo "src-git passwall https://github.com/Openwrt-Passwall/openwrt-passwall.git;main" >> feeds.conf.default
          
          ./scripts/feeds update -a
          # 弱化 Rust 宿主检查
          find package/feeds/ -name "Makefile" | xargs sed -i 's/rust\/host//g' 2>/dev/null || true
          ./scripts/feeds install -a

      - name: 4. 深度补丁与配置注入
        run: |
          cd openwrt
          # 物理屏蔽分区大小限制
          find . -type f -name "*.mk" -o -name "Makefile" | xargs sed -i 's/$(error The rootfs is too large/@echo Warning/g' 2>/dev/null || true
          
          # 针对 GCC 14 全局注入兼容性 flag
          sed -i 's/TARGET_CFLAGS +=/TARGET_CFLAGS += -fcommon -D_GNU_SOURCE /' include/target.mk
          
          # 注入自定义配置
          [ -f ../$CONFIG_FILE ] && cp ../$CONFIG_FILE .config
          sed -i 's/CONFIG_TARGET_KERNEL_PARTSIZE=.*/CONFIG_TARGET_KERNEL_PARTSIZE=64/g' .config
          sed -i 's/CONFIG_TARGET_ROOTFS_PARTSIZE=.*/CONFIG_TARGET_ROOTFS_PARTSIZE=1024/g' .config
          {
            echo "CONFIG_TARGET_IMAGES_GZIP=y"
            echo "CONFIG_VERSION_NUMBER=\"25.12.0\""
            echo "CONFIG_PACKAGE_luci-compat=y"
            echo "CONFIG_PACKAGE_luci-lua-runtime=y"
            echo "CONFIG_PACKAGE_rust=n" 
          } >> .config
          
          # 修复 mtools 文档编译错误
          [ -d tools/mtools ] && sed -i 's/$(MAKE) -C $(HOST_BUILD_DIR) install/$(MAKE) -C $(HOST_BUILD_DIR) install-exec/g' tools/mtools/Makefile
          
          make defconfig

      - name: 5. 最终编译阶段
        run: |
          # 使用通配符确保进入正确的源码目录
          cd $(pwd)/openwrt 
          [ -f "$HOME/.cargo/env" ] && source "$HOME/.cargo/env"
          
          # 再次确认 Makefile 存在
          if [ ! -f "Makefile" ]; then echo "Error: Makefile not found in $(pwd)"; exit 1; fi
          
          make download -j8 || true
          
          # 正式开启编译，带入宿主 Rust 路径
          make -j$(nproc) RUSTC=$(which rustc) CARGO=$(which cargo) || \
          make -j1 V=s RUSTC=$(which rustc) CARGO=$(which cargo)

      - name: 6. 发布固件
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: v25.12-Final-${{ github.run_id }}
          files: openwrt/bin/targets/x86/64/*combined-efi.img*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
