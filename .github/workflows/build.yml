name: OpenWrt-25.12.0-Official-Release

on:
  workflow_dispatch:
  push:
    paths:
      - 'seed.config'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  CONFIG_FILE: seed.config
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: 检查项目
        uses: checkout@v4

      - name: 初始化编译环境
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install $(curl -fsSL https://raw.githubusercontent.com/anthony65535/scripts/master/openwrt-env-full)
          sudo timedatectl set-timezone "$TZ"

      - name: 下载源码
        run: git clone $REPO_URL -b $REPO_BRANCH openwrt

      - name: 更新 Feeds 并强力修复 Passwall 下载
        run: |
          cd openwrt
          # 1. 修正版本号对齐官方 25.12.0 路径
          sed -i 's/SNAPSHOT/25.12.0/g' include/version.mk
          sed -i 's/SNAPSHOT/25.12.0/g' package/base-files/image-config.in
          
          # 2. 注入 Passwall 源码
          echo "src-git passwall https://github.com/xiaorouji/openwrt-passwall" >> feeds.conf.default
          
          # 3. 分步执行：先更新全部，再专门更新并安装 passwall
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ./scripts/feeds update passwall
          ./scripts/feeds install -p passwall -a
          
          # 4. 补齐 25.12 必需的 Lua 环境
          ./scripts/feeds install luci-lua-runtime

      - name: 注入配置补丁
        run: |
          [ -f $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
          cd openwrt
          {
            echo "CONFIG_VERSION_SNAPSHOT=n"
            echo "CONFIG_VERSION_NUMBER=\"25.12.0\""
            echo "CONFIG_PACKAGE_luci=y"
            echo "CONFIG_PACKAGE_luci-compat=y"
            echo "CONFIG_PACKAGE_luci-lua-runtime=y"
            echo "CONFIG_PACKAGE_dnsmasq=n"
            echo "CONFIG_PACKAGE_dnsmasq-full=y"
            echo "CONFIG_PACKAGE_luci-app-passwall=y"
            echo "CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y"
          } >> .config
          make defconfig

      - name: 启动编译
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: 发布固件
        uses: softprops/action-gh-release@v1
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: 25.12.0-Official-Fixed
          files: openwrt/bin/targets/x86/64/*combined-efi.img.gz
