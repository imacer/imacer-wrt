name: OpenWrt-25.12-Final-Fixed

on:
  workflow_dispatch:
  push:
    paths:
      - 'seed.config'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  CONFIG_FILE: seed.config
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: 1. 检出仓库
        uses: actions/checkout@v4

      - name: 2. 释放磁盘空间 (确保 1GB 镜像有地方放)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install $(curl -fsSL https://raw.githubusercontent.com/anthony65535/scripts/master/openwrt-env-full)
          sudo timedatectl set-timezone "$TZ"

      - name: 3. 克隆源码并同步 Feeds
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt
          sed -i '1i src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main' feeds.conf.default
          sed -i '2i src-git passwall https://github.com/Openwrt-Passwall/openwrt-passwall.git;main' feeds.conf.default
          
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # 【核心修复】修正 Rust 在 CI 环境下的编译死锁
          find feeds/packages/lang/rust -name Makefile -exec sed -i 's/download-ci-llvm = true/download-ci-llvm = "if-unchanged"/g' {} +
          
          ./scripts/feeds install luci-compat luci-lua-runtime

      - name: 4. 注入配置
        run: |
          [ -f $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
          cd openwrt
          sed -i 's/SNAPSHOT/25.12.0/g' include/version.mk
          {
            echo "CONFIG_VERSION_NUMBER=\"25.12.0\""
            echo "CONFIG_PACKAGE_luci-compat=y"
            echo "CONFIG_PACKAGE_luci-lua-runtime=y"
            echo "CONFIG_PACKAGE_dnsmasq=n"
            echo "CONFIG_PACKAGE_dnsmasq-full=y"
          } >> .config
          sed -i 's/=m/=y/g' .config
          rm -rf tmp
          make defconfig

      - name: 5. 编译固件
        run: |
          cd openwrt
          sudo docker image prune -a -f
          ulimit -n 65535
          make -j$(nproc) || make -j1 V=s

      - name: 6. 发布 Release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          tag_name: 25.12.0-Final-Official
          files: openwrt/bin/targets/x86/64/*combined-efi.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
