name: OpenWrt-25.12-Final-V7-SystemRust

on:
  workflow_dispatch:
  push:
    paths:
      - 'seed.config'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  CONFIG_FILE: seed.config
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: 1. 检出仓库
        uses: actions/checkout@v4

      - name: 2. 准备编译环境 (提前安装系统 Rust)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup
          sudo -E apt-get -qq update
          # 关键点：直接把系统级的 rustc 和 cargo 装上，替代源码里的那个会报错的版本
          sudo -E apt-get -qq install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git gperf haveged lrzsz libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lld llvm liblzo2-dev make scons squashfs-tools upx-ucl unzip vim wget xmlto xxd zlib1g-dev rustc cargo
          sudo timedatectl set-timezone "$TZ"

      - name: 3. 克隆源码与“釜底抽薪”
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt
          sed -i '1i src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main' feeds.conf.default
          sed -i '2i src-git passwall https://github.com/Openwrt-Passwall/openwrt-passwall.git;main' feeds.conf.default
          
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # 【这是本次最关键的一步】
          # 直接物理删除源码里的 rust 文件夹，防止它启动那个会报错的编译脚本
          rm -rf feeds/packages/lang/rust
          
          ./scripts/feeds install luci-compat luci-lua-runtime

      - name: 4. 注入配置
        run: |
          [ -f $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
          cd openwrt
          sed -i 's/SNAPSHOT/25.12.0/g' include/version.mk
          {
            echo "CONFIG_VERSION_NUMBER=\"25.12.0\""
            echo "CONFIG_PACKAGE_luci-compat=y"
            echo "CONFIG_PACKAGE_luci-lua-runtime=y"
            echo "CONFIG_PACKAGE_dnsmasq=n"
            echo "CONFIG_PACKAGE_dnsmasq-full=y"
          } >> .config
          
          sed -i 's/=m/=y/g' .config
          rm -rf tmp
          make defconfig

      - name: 5. 执行正式编译
        run: |
          cd openwrt
          sudo docker image prune -a -f
          ulimit -n 65535
          # 核心插件现在会自动链接到系统级的 rustc 运行
          make -j$(nproc) || make -j1 V=s

      - name: 6. 发布 Release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          tag_name: 25.12.0-V7-Success
          files: openwrt/bin/targets/x86/64/*combined-efi.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
