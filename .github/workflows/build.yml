name: OpenWrt-V45

on:
  workflow_dispatch:
  push:
    paths:
      - 'seed.config'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  CONFIG_FILE: seed.config
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. 系统环境极致补全
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup /usr/lib/jvm /opt/hostedtoolcache
          sudo apt-get update
          # 加入了 help2man, texinfo (makeinfo), bison, flex 等全套工具
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git gperf haveged lrzsz libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lld llvm liblzo2-dev make scons squashfs-tools upx-ucl unzip vim wget xmlto xxd zlib1g-dev help2man texinfo
          
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: 3. 源码处理与 Rust 柔性化
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt
          sed -i '1i src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main' feeds.conf.default
          sed -i '2i src-git passwall https://github.com/Openwrt-Passwall/openwrt-passwall.git;main' feeds.conf.default
          ./scripts/feeds update -a
          find package/feeds/ -name "Makefile" | xargs sed -i 's/rust\/host//g' 2>/dev/null || true
          ./scripts/feeds install -a

      - name: 4. 配置注入与报错物理切除
        run: |
          cd openwrt
          # 物理抹除大小检查限制
          find . -type f -name "*.mk" -o -name "Makefile" | xargs sed -i 's/$(error The rootfs is too large/@echo Warning/g' 2>/dev/null || true
          
          # 【V45 核心：修复 mtools 编译报错】
          # 强制禁用 mtools 的文档生成，避开 help2man 兼容性问题
          [ -d tools/mtools ] && sed -i 's/$(MAKE) -C $(HOST_BUILD_DIR) install/$(MAKE) -C $(HOST_BUILD_DIR) install-exec/g' tools/mtools/Makefile

          [ -f ../$CONFIG_FILE ] && cp ../$CONFIG_FILE .config
          
          sed -i 's/CONFIG_TARGET_KERNEL_PARTSIZE=.*/CONFIG_TARGET_KERNEL_PARTSIZE=64/g' .config
          sed -i 's/CONFIG_TARGET_ROOTFS_PARTSIZE=.*/CONFIG_TARGET_ROOTFS_PARTSIZE=1024/g' .config
          {
            echo "CONFIG_TARGET_IMAGES_GZIP=y"
            echo "CONFIG_VERSION_NUMBER=\"25.12.0\""
            echo "CONFIG_PACKAGE_luci-compat=y"
            echo "CONFIG_PACKAGE_luci-lua-runtime=y"
            echo "CONFIG_PACKAGE_rust=n" 
          } >> .config
          sed -i 's/SNAPSHOT/25.12.0/g' include/version.mk
          sed -i 's/=m/=y/g' .config
          make defconfig

      - name: 5. 最终编译执行
        run: |
          cd openwrt
          source $HOME/.cargo/env
          export PATH="$HOME/.cargo/bin:$PATH"
          
          make download -j8 || make download -j1 V=s
          find dl -size -1k -exec rm -f {} +
          
          # 正式编译，明确传递 RUST 和 CARGO 路径
          make -j$(nproc) RUSTC=$(which rustc) CARGO=$(which cargo) || make -j1 V=s RUSTC=$(which rustc) CARGO=$(which cargo)

      - name: 6. 固件发布
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: v25.12-F-${{ github.run_id }}
          files: openwrt/bin/targets/x86/64/*combined-efi.img*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
