name: OpenWrt-V88

on:
  workflow_dispatch:
  push:
    paths:
      - 'seed.config'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  CONFIG_FILE: seed.config
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. 极致磁盘清理
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup /usr/lib/jvm /opt/hostedtoolcache
          sudo rm -rf /usr/lib/google-cloud-sdk /usr/local/lib/node_modules /usr/local/bin/aliyun /usr/local/bin/az /usr/local/bin/kubectl
          docker rmi $(docker images -q) || true
          sudo apt-get clean
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git gperf haveged lrzsz libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lld llvm liblzo2-dev make scons squashfs-tools upx-ucl unzip vim wget xmlto xxd zlib1g-dev help2man texinfo libpam0g-dev golang-go
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: 3. 源码检出与 Feeds 同步
        run: |
          rm -rf openwrt
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt
          echo "src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main" >> feeds.conf.default
          echo "src-git passwall https://github.com/Openwrt-Passwall/openwrt-passwall.git;main" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 4. 深度修复与全域参数注入
        run: |
          cd openwrt
          # 1. 屏蔽分区限制
          find . -type f -name "*.mk" -o -name "Makefile" | xargs sed -i 's/$(error The rootfs is too large/@echo Warning/g' 2>/dev/null || true
          
          # 2. 【V88 核心修复】：通过 CPPFLAGS 强行注入 Lua 宏和 GCC 14 兼容参数
          # 解决了 LUA_RELEASE 缺失导致的编译中断，同时重命名 util-linux 冲突变量
          sed -i 's/TARGET_CFLAGS +=/TARGET_CFLAGS += -fcommon -fpermissive -Dprogram_invocation_name=prg_inv_name -Dprogram_invocation_short_name=prg_inv_sname -Wno-error=incompatible-pointer-types -Wno-error=implicit-function-declaration -Wno-error=redundant-decls -D_GNU_SOURCE -include pwd.h -include grp.h /' include/target.mk
          echo 'TARGET_CPPFLAGS += -DLUA_RELEASE=\"5.1.5\"' >> include/target.mk
          
          # 3. 修复翻译路径
          mkdir -p package/feeds/passwall/luci-app-passwall/po/zh-cn
          [ -d package/feeds/passwall/luci-app-passwall/po/zh_Hans ] && cp package/feeds/passwall/luci-app-passwall/po/zh_Hans/*.po package/feeds/passwall/luci-app-passwall/po/zh-cn/ 2>/dev/null || true

          # 4. 配置注入与分区锁定
          [ -f ../$CONFIG_FILE ] && cp ../$CONFIG_FILE .config
          sed -i 's/CONFIG_TARGET_KERNEL_PARTSIZE=.*/CONFIG_TARGET_KERNEL_PARTSIZE=64/g' .config
          sed -i 's/CONFIG_TARGET_ROOTFS_PARTSIZE=.*/CONFIG_TARGET_ROOTFS_PARTSIZE=512/g' .config
          {
            echo "CONFIG_TARGET_IMAGES_GZIP=y"
            echo "CONFIG_PACKAGE_luci-compat=y"
            echo "CONFIG_PACKAGE_luci-lua-runtime=y"
            echo "CONFIG_PACKAGE_rust=n"
            echo "CONFIG_PACKAGE_brook=n"
          } >> .config
          make defconfig

      - name: 5. 编译执行
        run: |
          cd openwrt
          [ -f "$HOME/.cargo/env" ] && source "$HOME/.cargo/env"
          make download -j16
          
          # 分段构建以确保稳定性
          make tools/install -j$(nproc) || make tools/install -j1 V=s
          make toolchain/install -j$(nproc) || make toolchain/install -j1 V=s
          
          # 释放 dl 空间
          rm -rf dl/*
          
          # 最终全量编译
          make -j$(nproc) || make -j1 V=s

      - name: 6. 整理并发布
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: v25.12-Final-${{ github.run_id }}
          files: openwrt/bin/targets/x86/64/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
