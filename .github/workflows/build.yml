name: OpenWrt-25.12.0-Passwall-Latest

on:
  workflow_dispatch:
  push:
    paths:
      - 'seed.config'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  CONFIG_FILE: seed.config
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: 检查项目
        uses: actions/checkout@v4

      - name: 初始化编译环境
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install $(curl -fsSL https://raw.githubusercontent.com/anthony65535/scripts/master/openwrt-env-full)
          sudo timedatectl set-timezone "$TZ"

      - name: 下载源码
        run: git clone $REPO_URL -b $REPO_BRANCH openwrt

      - name: 注入 Passwall 最新双源 (新架构)
        run: |
          cd openwrt
          # 1. 对齐官方 25.12.0 正式版路径
          sed -i 's/SNAPSHOT/25.12.0/g' include/version.mk
          sed -i 's/SNAPSHOT/25.12.0/g' package/base-files/image-config.in
          
          # 2. 在顶部插入 Passwall 最新代码源 (方法 1)
          # 注意：使用双引号并在顶部插入，确保优先级最高
          sed -i '1i src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main' feeds.conf.default
          sed -i '2i src-git passwall_luci https://github.com/Openwrt-Passwall/openwrt-passwall.git;main' feeds.conf.default
          
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          # 3. 必须安装 Lua 环境，否则最新版在 25.12 下依然无法显示
          ./scripts/feeds install luci-lua-runtime luci-compat

      - name: 注入配置补丁
        run: |
          [ -f $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
          cd openwrt
          {
            echo "CONFIG_VERSION_SNAPSHOT=n"
            echo "CONFIG_VERSION_NUMBER=\"25.12.0\""
            echo "CONFIG_PACKAGE_luci-compat=y"
            echo "CONFIG_PACKAGE_luci-lua-runtime=y"
            echo "CONFIG_PACKAGE_dnsmasq=n"
            echo "CONFIG_PACKAGE_dnsmasq-full=y"
          } >> .config
          make defconfig

      - name: 启动编译
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: 发布固件
        uses: softprops/action-gh-release@v1
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: 25.12.0-Passwall-Latest-Code
          files: openwrt/bin/targets/x86/64/*combined-efi.img.gz
