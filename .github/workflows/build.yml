name: OpenWrt-25.12-V33

on:
  workflow_dispatch:
  push:
    paths:
      - 'seed.config'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  CONFIG_FILE: seed.config
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Space Clean & Rust Install
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup /usr/lib/jvm /opt/hostedtoolcache
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git gperf haveged lrzsz libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lld llvm liblzo2-dev make scons squashfs-tools upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: 3. Clone & Fix Dependencies
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt
          sed -i '1i src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main' feeds.conf.default
          sed -i '2i src-git passwall https://github.com/Openwrt-Passwall/openwrt-passwall.git;main' feeds.conf.default
          ./scripts/feeds update -a
          
          # 注入合法的 Rust 依赖占位
          mkdir -p package/lang/rust
          echo 'include $(TOPDIR)/rules.mk' > package/lang/rust/Makefile
          echo 'PKG_NAME:=rust' >> package/lang/rust/Makefile
          echo 'PKG_VERSION:=custom' >> package/lang/rust/Makefile
          echo 'include $(INCLUDE_DIR)/host-build.mk' >> package/lang/rust/Makefile
          echo '$(eval $(call HostBuild))' >> package/lang/rust/Makefile
          
          ./scripts/feeds install -a
          # 抹除根分区大小报错限制
          find target/linux/x86/ -name "Makefile" | xargs sed -i 's/$(error The rootfs is too large/@echo Warning/g' 2>/dev/null || true

      - name: 4. Config Injection
        run: |
          [ -f $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
          cd openwrt
          # 锁定分区大小为 1GB
          sed -i 's/CONFIG_TARGET_KERNEL_PARTSIZE=.*/CONFIG_TARGET_KERNEL_PARTSIZE=64/g' .config
          sed -i 's/CONFIG_TARGET_ROOTFS_PARTSIZE=.*/CONFIG_TARGET_ROOTFS_PARTSIZE=1024/g' .config
          {
            echo "CONFIG_TARGET_IMAGES_GZIP=y"
            echo "CONFIG_VERSION_NUMBER=\"25.12.0\""
            echo "CONFIG_PACKAGE_luci-compat=y"
            echo "CONFIG_PACKAGE_luci-lua-runtime=y"
            echo "CONFIG_PACKAGE_rust=y"
          } >> .config
          sed -i 's/SNAPSHOT/25.12.0/g' include/version.mk
          sed -i 's/=m/=y/g' .config
          make defconfig

      - name: 5. Final Build
        run: |
          cd openwrt
          source $HOME/.cargo/env
          # 【V33 关键修复：确保目录层级深度存在】
          mkdir -p staging_dir/host/bin
          mkdir -p staging_dir/host/stamp
          
          # 强制物理链接系统 Rust
          ln -sf $(which rustc) staging_dir/host/bin/rustc
          ln -sf $(which cargo) staging_dir/host/bin/cargo
          # 标记 Rust 为已安装，防止 make 重新下载
          touch staging_dir/host/stamp/.rust_installed
          
          make download -j8
          rm -rf dl/*
          # 启动全量编译
          make -j$(nproc) PATH="$HOME/.cargo/bin:$PATH" || make -j1 V=s PATH="$HOME/.cargo/bin:$PATH"

      - name: 6. Release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          tag_name: v25.12.0-final-${{ github.run_id }}
          files: openwrt/bin/targets/x86/64/*combined-efi.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
