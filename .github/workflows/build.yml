name: OpenWrt-25.12-Ultra-V19

on:
  workflow_dispatch:
  push:
    paths:
      - 'seed.config'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  CONFIG_FILE: seed.config
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: 1. 检出仓库
        uses: actions/checkout@v4

      - name: 2. 准备编译环境 (注入官方最新 Rust)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git gperf haveged lrzsz libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lld llvm liblzo2-dev make scons squashfs-tools upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          
          # 安装官方 Rust 编译器 (满足 1.80+ 的硬性需求)
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          sudo timedatectl set-timezone "$TZ"

      - name: 3. 克隆源码与“虚无化”Rust 定义
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt
          # 注入插件源
          sed -i '1i src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main' feeds.conf.default
          sed -i '2i src-git passwall https://github.com/Openwrt-Passwall/openwrt-passwall.git;main' feeds.conf.default
          
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # 【V19 核心杀招：重写 Rust Makefile，彻底切断源码下载逻辑】
          # 不管 Rust 源码包在哪，我们直接给它一个空壳定义，让它瞬间完成
          RUST_MAKEFILE=$(find feeds/packages/lang/rust/ -name "Makefile" 2>/dev/null | head -n 1)
          if [ -f "$RUST_MAKEFILE" ]; then
            echo "正在对 Rust 进行虚无化改写: $RUST_MAKEFILE"
            cat <<EOF > "$RUST_MAKEFILE"
include \$(TOPDIR)/rules.mk
PKG_NAME:=rust
PKG_VERSION:=custom
include \$(INCLUDE_DIR)/host-build.mk
\$(eval \$(call HostBuild))
EOF
          fi

          # 抹除其他潜在的 Rust 依赖字符串，双重保险
          find package/feeds/ -name "Makefile" | xargs sed -i 's/rust\/host//g' 2>/dev/null || true
          find package/feeds/ -name "Makefile" | xargs sed -i 's/+rust//g' 2>/dev/null || true
          
          ./scripts/feeds install luci-compat luci-lua-runtime

      - name: 4. 注入配置与预处理
        run: |
          [ -f $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
          cd openwrt
          # 修正版本号
          sed -i 's/SNAPSHOT/25.12.0/g' include/version.mk
          {
            echo "CONFIG_VERSION_NUMBER=\"25.12.0\""
            echo "CONFIG_PACKAGE_luci-compat=y"
            echo "CONFIG_PACKAGE_luci-lua-runtime=y"
            echo "CONFIG_PACKAGE_rust=n"
          } >> .config
          
          sed -i 's/=m/=y/g' .config
          rm -rf tmp
          make defconfig

      - name: 5. 执行正式编译 (全路径强力注入版)
        run: |
          cd openwrt
          source $HOME/.cargo/env
          
          # 物理拷贝官方编译器到 OpenWrt 内部路径，确保插件能直接调用
          mkdir -p staging_dir/host/bin
          cp -af $(which rustc) staging_dir/host/bin/rustc
          cp -af $(which cargo) staging_dir/host/bin/cargo
          cp -af $(which rustdoc) staging_dir/host/bin/rustdoc
          
          # 伪造 stamp 文件，防止系统尝试重新构建已被虚无化的 Rust
          mkdir -p staging_dir/host/stamp
          touch staging_dir/host/stamp/.rust_installed
          
          export PATH="$HOME/.cargo/bin:$PATH"
          export CARGO_HOME="$HOME/.cargo"
          
          ulimit -n 65535
          # 开启编译
          make -j$(nproc) PATH="$PATH" CARGO_HOME="$CARGO_HOME" || make -j1 V=s PATH="$PATH" CARGO_HOME="$CARGO_HOME"

      - name: 6. 发布 Release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          tag_name: 25.12.0-Final-V19
          files: openwrt/bin/targets/x86/64/*combined-efi.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
