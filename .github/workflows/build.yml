name: OpenWrt-25.12-Final-Fixed-V2

on:
  workflow_dispatch:
  push:
    paths:
      - 'seed.config'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  CONFIG_FILE: seed.config
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: 1. 检出仓库
        uses: actions/checkout@v4

      - name: 2. 准备编译环境 (深度清理磁盘并安装依赖)
        run: |
          # 清理垃圾释放空间
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup
          
          # 直接安装 OpenWrt 必需依赖，解决 404 问题
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git gperf haveged lrzsz libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lld llvm lzo-alternate--v1-dev make scons squashfs-tools upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          
          sudo timedatectl set-timezone "$TZ"

      - name: 3. 克隆源码并同步 Feeds
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt
          sed -i '1i src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main' feeds.conf.default
          sed -i '2i src-git passwall https://github.com/Openwrt-Passwall/openwrt-passwall.git;main' feeds.conf.default
          
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # 【核心修复】修正 Rust 在 CI 环境下的编译死锁，解决 Error 1
          find feeds/packages/lang/rust -name Makefile -exec sed -i 's/download-ci-llvm = true/download-ci-llvm = "if-unchanged"/g' {} +
          
          ./scripts/feeds install luci-compat luci-lua-runtime

      - name: 4. 注入配置
        run: |
          [ -f $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
          cd openwrt
          # 修正版本号显示
          sed -i 's/SNAPSHOT/25.12.0/g' include/version.mk
          {
            echo "CONFIG_VERSION_NUMBER=\"25.12.0\""
            echo "CONFIG_PACKAGE_luci-compat=y"
            echo "CONFIG_PACKAGE_luci-lua-runtime=y"
            echo "CONFIG_PACKAGE_dnsmasq=n"
            echo "CONFIG_PACKAGE_dnsmasq-full=y"
          } >> .config
          
          # 将所有模块设置为内建(y)，确保一次性打包
          sed -i 's/=m/=y/g' .config
          rm -rf tmp
          make defconfig

      - name: 5. 执行正式编译
        run: |
          cd openwrt
          # 临门一脚释放 Docker 空间
          sudo docker image prune -a -f
          ulimit -n 65535
          # 多线程编译，失败自动转单线程 V=s 输出
          make -j$(nproc) || make -j1 V=s

      - name: 6. 发布 Release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          tag_name: 25.12.0-Final-V2
          files: openwrt/bin/targets/x86/64/*combined-efi.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
