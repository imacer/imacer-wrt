name: Build OpenWrt 25.12 Stable

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true

      - name: Init Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
          gettext git libncurses5-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev \
          swig python3-dev libelf-dev qemu-utils jq

      - name: Clone OpenWrt Source
        run: |
          # 使用最新的 v25.12.0 稳定分支
          git clone --depth 1 -b v25.12.0 https://github.com/openwrt/openwrt.git openwrt

      - name: Inject Passwall
        run: |
          cd openwrt
          echo "src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main" >> feeds.conf.default
          echo "src-git passwall_luci https://github.com/Openwrt-Passwall/openwrt-passwall.git;main" >> feeds.conf.default
          ./scripts/feeds update -a
          
          # 【关键】物理删除会导致报错的 Rust 包源码
          # 这样编译系统会因为找不到源码而自动跳过这些包，避开 Rust 编译大坑
          rm -rf feeds/passwall_packages/shadowsocks-rust
          rm -rf feeds/passwall_packages/shadow-tls
          
          # 移除冲突的旧包并安装
          rm -rf feeds/packages/net/xray-core feeds/packages/net/sing-box
          ./scripts/feeds install -a

      - name: Load Config
        run: |
          # 载入你的 seed.config
          [ -f seed.config ] && cp seed.config openwrt/.config
          cd openwrt
          
          # 强行注入官方 Release 列表中的稳定核心组件（剔除 Rust 版）
          {
            echo "CONFIG_PACKAGE_luci-app-passwall=y"
            echo "CONFIG_PACKAGE_xray-core=y"
            echo "CONFIG_PACKAGE_sing-box=y"
            echo "CONFIG_PACKAGE_chinadns-ng=y"
            echo "CONFIG_PACKAGE_ipt2socks=y"
            echo "CONFIG_PACKAGE_shadowsocks-libev-ss-local=y"
            echo "CONFIG_PACKAGE_shadowsocks-libev-ss-redir=y"
            echo "CONFIG_PACKAGE_shadowsocks-libev-ss-server=y"
            echo "CONFIG_PACKAGE_trojan-plus=y"
            echo "CONFIG_PACKAGE_naiveproxy=y"
          } >> .config
          
          make defconfig

      - name: Compile
        run: |
          cd openwrt
          make download -j$(nproc)
          # 开始编译，如果失败则输出详细日志
          make -j$(nproc) || make -j1 V=s

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v25.12-Release-${{ github.run_id }}
          name: OpenWrt 25.12.0 (Passwall Built)
          # 自动寻找编译生成的 efi 镜像文件
          files: openwrt/bin/targets/x86/64/*combined-efi.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
